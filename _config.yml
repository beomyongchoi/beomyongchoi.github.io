# 기본 사이트 설정
title: BYAI
email: dev.bychoi@gmail.com
description: The time of man has come to an end
url: "https://beomyongchoi.github.io"
baseurl: ""

# 빌드 설정
remote_theme: riggraz/no-style-please

# no-style-please 전용 설정
theme_config:
  appearance: "auto" # "light", "dark", 또는 "auto" (시스템 설정 따라감)
  date_format: "%Y-%m-%d" # 포스트 날짜 형식
  show_description: true # 블로그 설명 표시 여부

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 마크다운 설정
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 포스트 기본 설정
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "beomyong choi"
      comments: true

# 제외할 파일/폴더
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# 시간대 설정
timezone: Asia/Seoul
