# 기본 사이트 설정
title: BYAI
email: dev.bychoi@gmail.com
description:
  인간 시대의 끝이 도래했다.
url: "https://beomyongchoi.github.io
baseurl: ""

# 빌드 설정
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 마크다운 설정
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 포스트 기본 설정
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "beomyong choi"
      comments: true

# 제외할 파일/폴더
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# 시간대 설정
timezone: Asia/Seoul